name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: make lint
      - name: Unit tests
        run: pytest
      - name: Smoke test
        run: make smoke
      - name: Negative claims
        run: make ingest-all negative-claims
      - name: Corrupted artifact tests
        run: make corrupted-tests
      - name: Experiment summaries
        run: make reproduce-core scalability baseline summaries
